<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="980" height="300" rx="12" fill="#0f172a"/>
  <text x="490" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">SpecForge pipeline</text>

  <!-- inputs -->
  <rect x="30" y="80" width="170" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="115" y="105" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="600">Existing codebase</text>
  <text x="115" y="126" text-anchor="middle" fill="#94a3b8" font-size="12">Python source tree</text>

  <rect x="30" y="170" width="170" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="115" y="195" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="600">Business request</text>
  <text x="115" y="216" text-anchor="middle" fill="#94a3b8" font-size="12">"Add usage-based invoicing"</text>

  <!-- analyze -->
  <rect x="260" y="120" width="170" height="76" rx="10" fill="#132a4a" stroke="#2563eb"/>
  <text x="345" y="149" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">1 · Analyze</text>
  <text x="345" y="170" text-anchor="middle" fill="#94a3b8" font-size="12">ast: functions, classes,</text>
  <text x="345" y="186" text-anchor="middle" fill="#94a3b8" font-size="12">HTTP endpoints</text>

  <!-- generate -->
  <rect x="490" y="120" width="180" height="76" rx="10" fill="#132a4a" stroke="#2563eb"/>
  <text x="580" y="149" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">2 · Generate</text>
  <text x="580" y="170" text-anchor="middle" fill="#94a3b8" font-size="12">spec · stories · criteria · tests</text>
  <text x="580" y="186" text-anchor="middle" fill="#94a3b8" font-size="12">LLM prose, structure in code</text>

  <!-- validate -->
  <rect x="730" y="120" width="180" height="76" rx="10" fill="#14321f" stroke="#16a34a"/>
  <text x="820" y="149" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">3 · Validate</text>
  <text x="820" y="170" text-anchor="middle" fill="#94a3b8" font-size="12">completeness · security</text>
  <text x="820" y="186" text-anchor="middle" fill="#94a3b8" font-size="12">traceability · hallucination</text>

  <!-- llm plug -->
  <rect x="490" y="228" width="180" height="46" rx="10" fill="#1e293b" stroke="#475569" stroke-dasharray="5 4"/>
  <text x="580" y="247" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Pluggable LLM backend</text>
  <text x="580" y="264" text-anchor="middle" fill="#94a3b8" font-size="11">MockLLM (offline) · Ollama (local)</text>
  <line x1="580" y1="228" x2="580" y2="196" stroke="#64748b" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- output -->
  <rect x="730" y="40" width="180" height="52" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="820" y="61" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">artefacts.json + report.md</text>
  <text x="820" y="80" text-anchor="middle" fill="#94a3b8" font-size="11">score 0–100 · pass/fail gate</text>

  <!-- arrows -->
  <line x1="200" y1="110" x2="252" y2="145" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="200" y1="200" x2="252" y2="170" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="430" y1="158" x2="482" y2="158" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="670" y1="158" x2="722" y2="158" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="820" y1="120" x2="820" y2="100" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
</svg>
