name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile (syntax check)
        run: python -m compileall specforge tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test the CLI end to end
        run: |
          python -m specforge analyze examples/sample_app
          python -m specforge run examples/sample_app --request "CI smoke test" --out-dir /tmp/out
